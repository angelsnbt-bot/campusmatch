kind = "web"
previewPath = "/"
title = "CampusMatch"
version = "1.0.0"
id = "artifacts/campusmatch"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20648

[services.development]
run = "pnpm --filter @workspace/campusmatch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/campusmatch", "run", "build" ]
serve = "static"
publicDir = "artifacts/campusmatch/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20648"
BASE_PATH = "/"
